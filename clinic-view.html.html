<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة الانتظار | صوفيگرام</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        #view-name { font-size: 2.5rem; margin-bottom: 5px; }
        #view-msg { color: #f39c12; font-size: 1.3rem; font-weight: bold; background: rgba(243, 156, 18, 0.1); display: inline-block; padding: 5px 20px; border-radius: 10px; margin-top: 10px; }
        .num-box { font-size: 10rem; color: #2ecc71; font-weight: bold; text-shadow: 0 0 30px rgba(46,204,113,0.5); margin: 20px 0; }
        .status-tag { padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; display: inline-block; }
        .alert-area { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; max-width: 400px; margin: 20px auto; }
        input { background: #000; border: 1px solid #f39c12; color: #fff; padding: 10px; width: 60px; text-align: center; font-size: 1.5rem; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header-box">
        <h1 id="view-name">العيادة النموذجية</h1>
        <div id="view-msg" style="display:none;"></div><br>
        <span id="view-status" class="status-tag"></span>
    </div>
    <p style="color:#666; margin-top: 30px;">الرقم الحالي الآن:</p>
    <div class="num-box" id="view-num">1</div>
    <div class="alert-area">
        <p>🔔 نبهني بصوت عند وصول الرقم:</p>
        <input type="number" id="target-num" placeholder="..">
        <p id="alert-status" style="color:#f39c12; margin-top:10px">التنبيه مطفأ</p>
    </div>
    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUShD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // الاستماع للتغييرات "لايف"
        db.ref('clinic/').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('view-num').innerText = data.num;
                document.getElementById('view-name').innerText = data.name;
                document.getElementById('view-status').innerText = data.status;
                document.getElementById('view-status').style.background = (data.status === 'مفتوح الآن') ? '#2ecc71' : '#e74c3c';
                
                let msgDiv = document.getElementById('view-msg');
                if(data.msg && data.msg.trim() !== "") {
                    msgDiv.innerText = "📢 " + data.msg;
                    msgDiv.style.display = "inline-block";
                } else {
                    msgDiv.style.display = "none";
                }

                // التنبيه الصوتي
                let target = document.getElementById('target-num').value;
                if(target && parseInt(data.num) >= parseInt(target)) {
                    document.getElementById('beep').play();
                    document.getElementById('alert-status').innerText = "⚠️ حان دورك!";
                }
            }
        });
    </script>
</body>
</html>
